<html>

<head>
  <meta charset="utf-8" />
  <title>Morski Boj</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/x-icon" href="img/waves.png">
</head>

<body>
  <div class="main">
    <div class="naslov">
      <h1>Morski Boj</h1>
      <p class="podnaslov">Poišči kaj je na dnu oseana</p>
      <div class="naslov-crta"></div>
    </div>
    <div class="igra">
      <div class="levaStran">

        <h3>NAVODILA</h3>
        <p>Premik levo: a</p>
        <p id="premik">Premik desno: d</p>
        <div class="panel-crta"></div>

        <button id="start">Začni igro</button>
        <button id="reset">Ponastavi igro</button>
        <button id="pavza">Pavza</button>
        <button id="level1">Level 1</button>
        <button id="level2">Level 2</button>
        <button id="level3">Level 3</button>

      </div>
      <div class="platno">
        <canvas id="canvas" width="700" height="500"></canvas>
      </div>
      <div class="desnaStran">
        <div class="rezultati">
          <p class="panel-naslov">Rezultati</p>
          <div class="panel-crta"></div>
          <p>Čas: <mark id="cas">00:00</mark></p>
          <p>Točke: <mark id="tocke">0</mark></p>
        </div>
        <div class="lestvica">
          <div class="panel-crta"></div>
          <p><strong>Lestvica</strong></p>
          <ol id="lestvica-seznam"></ol>
        </div>
      </div>
    </div>
    <div class="credits">
      <p>ustvaril: Leon ilc</p>
      <p><i>4 letnik</i></p>

    </div>
  </div>
</body>
<script src="js/jquery.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/script.js"></script>
<script src="js/alerts.js"></script>

</html>
